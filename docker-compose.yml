version: '3.8'

services:
  db:
    image: postgres:14
    container_name: interview-tracker-db
    environment:
      POSTGRES_DB: interview_task_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: interview-tracker-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=docker-secret-key-change-in-production
      - ALLOWED_HOSTS=127.0.0.1,localhost
      - DB_NAME=interview_task_tracker
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - ACCESS_TOKEN_MINUTES=30
      - REFRESH_TOKEN_DAYS=7
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: